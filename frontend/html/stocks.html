<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票追蹤系統</title>
    <link rel="stylesheet" href="/assets/styles.css">
    <link rel="stylesheet" href="/assets/stock.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="/assets/stocks.js" defer></script>
</head>
<body>
    <header>
        <h1>股票追蹤系統</h1>
        <nav>
            <ul>
                <li><a href="/index.html">首頁</a></li>
                <li><a href="/about.html">關於我</a></li>
                <li><a href="/projects.html">功能展示</a></li>
                <li><a href="/skills.html">技能介紹</a></li>
                <li><a href="/contact.html">聯絡方式</a></li>
            </ul>
        </nav>
        <div class="auth-buttons">
            <button id="profile-btn" onclick="goToProfile()" style="display:none;">個人資料</button>
            <button id="login-btn" onclick="goToLogin()">登入</button>
            <button id="logout-btn" onclick="logout()" style="display:none;">登出</button>
        </div>
    </header>

    <main class="content">
        <h2>📊 我的持股</h2>
        <div id="summary-box" class="summary-box"></div>

        <table>
            <thead>
                <tr>
                    <th>股票</th>
                    <th>股數</th>
                    <th>均價</th>
                    <th>現價</th>
                    <th>損益</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="stock-table-body"></tbody>
        </table>

        <button id="export-btn">📥 匯出 Excel</button>

        <h3>📥 新增/更新持股</h3>
        <form id="stock-form">
            <input type="text" id="symbol" placeholder="股票代碼" required>
            <input type="number" id="shares" placeholder="持股數量" required>
            <input type="number" id="avgPrice" placeholder="購入均價" step="0.01" required>
            <button type="submit">儲存</button>
        </form>

        <h3>💸 賣出股票</h3>
        <form id="sell-form">
            <input type="text" id="sell-symbol" placeholder="股票代碼" required>
            <input type="number" id="sell-shares" placeholder="股數" required>
            <input type="number" id="sell-price" placeholder="賣出價格" step="0.01" required>
            <input type="text" id="sell-note" placeholder="備註 (可選)">
            <button type="submit">紀錄賣出</button>
        </form>
    </main>

    <div id="chart-modal" class="modal">\        
        <div class="modal-content">
            <canvas id="stock-chart"></canvas>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 股票追蹤系統</p>
    </footer>
</body>
</html>
